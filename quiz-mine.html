<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BionIT Labs - JSON-Driven Quiz Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="quiz-card">
            <div class="quiz-header">
                <p class="eyebrow">Interactive Knowledge Check</p>
                <h1 id="quizTitle">Select a BionIT Labs Quiz Module</h1>
                <p class="quiz-subtitle">
                    Choose a quiz module below to load questions from a JSON file and test your knowledge.
                </p>
            </div>

            <div class="module-picker">
                <label for="moduleSelect"><strong>Choose Module:</strong></label>
                <select id="moduleSelect">
                    <option value="">-- Select a Quiz --</option>
                    <option value="myounit-essentials-quiz.json">MyoUnit Essentials</option>
                    <option value="bionit-master-quiz.json">Mixed Question Types Quiz</option>
                </select>
            </div>

            <form id="quizForm"></form>

            <div class="button-row">
                <button type="button" id="submitBtn">Submit Quiz</button>
            </div>

            <div id="results"></div>

            <div class="button-row">
                <button type="button" id="retakeBtn">Retake Quiz</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BionIT Labs - JSON-Driven Quiz Platform</title>
    <link rel="stylesheet" href="final-styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="quiz-card">
            <div class="quiz-header">
                <p class="eyebrow">Interactive Knowledge Check</p>
                <h1 id="quizTitle">Select a BionIT Labs Quiz Module</h1>
                <p class="quiz-subtitle" id="quizSubtitle">
                    Choose a quiz module below to load questions from a JSON file and test your knowledge.
                </p>
            </div>

            <div class="module-picker">
                <label for="moduleSelect"><strong>Choose Module:</strong></label>
                <select id="moduleSelect" aria-describedby="quizSubtitle">
                    <option value="">-- Select a Quiz --</option>
                    <option value="final-myounit-essentials-quiz.json">MyoUnit Essentials</option>
                    <option value="final-bionit-master-quiz.json">BionIT Master Quiz</option>
                </select>
            </div>

            <form id="quizForm" novalidate>
                <div id="quizQuestions"></div>

                <div class="button-row">
                    <button type="submit" id="submitBtn" disabled>Submit Quiz</button>
                </div>
            </form>

            <div id="results" aria-live="polite"></div>

            <div class="button-row">
                <button type="button" id="retakeBtn">Retake Quiz</button>
            </div>
        </section>
    </main>

    <script src="final-script.js"></script>
</body>
</html>
